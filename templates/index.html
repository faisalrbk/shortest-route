<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shortest Route</title>

    <!-- Single script — everything included (core + map-components + calcite) -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      calcite-shell {
        height: 100vh;
      }
      arcgis-map {
        display: block;
        height: 100%;
        flex: 1;
      }
    </style>
    <script>
      var esriConfig = {
        apiKey:
          "AAPTxy8BH1VEsoebNVZXo8HurJ4OtrIn0er_IZWYxlE4RtW8u6P1z7B3ah8P3TOhJIqvI701l8IsWNaTzxE3UUVjMeAFBwxGqyUPaJCOO-7aIFECet3csLjfzQJhvt0SHFsomEsjX0lOxXR3qO3uu17gN_YEYCpBUWrjikzbBRpY-Eq7PE6f30mxno58y7cHM-kMX-p_jOk1_TPuQYhSna3JEidGX26I-DzkWuB-FBB2Zq4.AT1_bOok1pTC",
      };
    </script>
  </head>
  <body>
    <calcite-shell>
      <calcite-alert
        id="port-alert"
        kind="warning"
        label="Port selection"
        placement="bottom"
      >
        <div slot="message">
          Both ports selected. Clear one to select a new port.
        </div>
      </calcite-alert>
      <calcite-navigation slot="header">
        <calcite-navigation-logo
          heading="Distance Calculator"
          icon="map-pin"
          slot="logo"
        ></calcite-navigation-logo>

        <div
          slot="content-center"
          style="display: flex; gap: 12px; align-items: center"
        >
          <calcite-combobox
            id="origin-port"
            placeholder="Origin port..."
            selection-mode="single"
            scale="m"
            style="width: 220px"
          ></calcite-combobox>

          <calcite-icon icon="arrow-right" scale="m"></calcite-icon>

          <calcite-combobox
            id="destination-port"
            placeholder="Destination port..."
            selection-mode="single"
            scale="m"
            style="width: 220px"
          ></calcite-combobox>

          <calcite-button
            id="calculate-btn"
            icon-start="measure-line"
            scale="m"
          >
            Calculate
          </calcite-button>
        </div>
      </calcite-navigation>

      <arcgis-map id="map" basemap="arcgis/imagery" zoom="4" center="0,20">
        
            <arcgis-expand slot="top-left" expand-tooltip="Basemap Gallery">
          <arcgis-basemap-gallery />
        </arcgis-expand>
        <arcgis-zoom slot="top-left"></arcgis-zoom>
        <arcgis-locate slot="top-left"></arcgis-locate>
      </arcgis-map>
    </calcite-shell>

    <script src="/static/js/map.js"></script>
    <script src="/static/js/ports.js"></script>
  </body>
</html>
